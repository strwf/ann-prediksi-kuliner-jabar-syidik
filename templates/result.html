<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Prediksi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff0f3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 20px rgba(255, 133, 162, 0.15); }
        .bg-pink-custom { background-color: #ff85a2; color: white; border-top-left-radius: 20px !important; border-top-right-radius: 20px !important; }
        .btn-outline-pink { color: #ff85a2; border-color: #ff85a2; border-radius: 10px; font-weight: bold; }
        .btn-outline-pink:hover { background-color: #ff85a2; color: white; }
        .text-pink { color: #d81b60; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card text-center mt-5">
                    <div class="card-header bg-pink-custom py-3">
                        <h4 class="mb-0">Hasil Analisis Model ANN</h4>
                    </div>
                    <div class="card-body p-5">
                        <p class="lead text-muted">Berdasarkan data historis, diprediksi pada tahun</p>
                        <h3 class="text-dark mb-4"><strong>{{ tahun }}</strong> di <strong>{{ kota }}</strong></h3>
                        
                        <p class="text-muted mb-1">Akan terdapat kurang lebih:</p>
                        <h1 class="display-2 fw-bold text-pink mb-3">{{ hasil }}</h1>
                        <p class="text-muted fw-bold">Unit Usaha (Restoran, RM, atau Cafe)</p>
                        
                        <hr class="my-4" style="border-color: #ffb3c6;">
                        <a href="/" class="btn btn-outline-pink w-100 py-2">Kembali ke Beranda</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
